<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Circled Cross Lodge — GOD MODE</title>

<style>
body {background:#000;color:#eee;font-family:Georgia;text-align:center;}
h1 {color:gold;text-shadow:0 0 20px gold;}

button {
padding:10px;margin:5px;
background:#111;color:#fff;
border:1px solid gold;
}

svg {display:block;margin:auto;}

.line {stroke:white;stroke-width:2;}
.glow {stroke:gold !important;stroke-width:4;}

.node {
fill:gold;
cursor:pointer;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;padding:20px;
}

.card {
background:#111;
padding:10px;
border:1px solid gold;
cursor:pointer;
}

.card img {width:100%;}

#tarotPage,#quizPage {display:none;}

#info {
background:#111;
padding:12px;
margin-top:10px;
min-height:140px;
border-top:1px solid gold;
}
</style>
</head>

<body>

<h1>Circled Cross Lodge — God Mode</h1>

<button onclick="show('treePage')">Tree</button>
<button onclick="show('tarotPage')">Tarot</button>
<button onclick="startQuiz()">Quiz</button>
<button onclick="toggleSound()">Sound</button>

<div id="treePage">
<svg width="600" height="820" id="tree"></svg>
<div id="info">Click a sphere or path</div>
</div>

<div id="tarotPage"><div id="tarot" class="grid"></div></div>

<div id="quizPage">
<h2>Initiation Quiz</h2>
<div id="q"></div>
<div id="answers"></div>
<div id="score"></div>
</div>

<script>

// ---------- SOUND ----------
let sound=false,ctx;
function toggleSound(){
sound=!sound;
if(sound) ctx=new (window.AudioContext||window.webkitAudioContext)();
}
function tone(f){
if(!sound) return;
let o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);
o.frequency.value=f;o.start();
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1);
}

// ---------- TREE POS ----------
const pos=[
[300,50],[150,170],[450,170],
[150,330],[450,330],[300,330],
[180,520],[420,520],
[300,660],[300,780]
];

// ---------- FULL SEPHIROTH (YOUR SYSTEM) ----------
const seph=[
["Kether","Eheieh","Metatron","White w/ gold flecks","Crown",
"Pure being. Source beyond form."],

["Chokmah","Yah","Ratziel","Grey","Left neck",
"Dynamic force. Raw creative impulse."],

["Binah","Jehovah Elohim","Tzaphkiel","Black","Right neck",
"Structure and form. The great womb."],

["Chesed","El","Tzadkiel","Blue","Left shoulder",
"Mercy, expansion, rulership."],

["Geburah","Elohim Gibor","Chamael","Red","Right shoulder",
"Severity, discipline, destruction."],

["Tiphereth","Jehovah Eloah","Michael","Gold","Heart",
"Balance, higher self, solar consciousness."],

["Netzach","Jehovah Sabaoth","Auriel","Green","Left hip",
"Emotion, desire, instinct."],

["Hod","Elohim Tzabaoth","Raphael","Orange","Right hip",
"Intellect, language, structure."],

["Yesod","Shaddai","Gabriel","Violet","Pelvis",
"Subconscious, dreams, gateway."],

["Malkuth","Adonai Malek","Sandalphon","Earth tones","Feet",
"Material world, manifestation."]
];

// ---------- PATHS + TAROT ----------
const paths=[
[0,1,"א","Fool"],[0,2,"ב","Magician"],
[1,2,"ג","High Priestess"],[1,3,"ד","Empress"],
[2,4,"ה","Emperor"],[3,5,"ו","Hierophant"],
[4,5,"ז","Lovers"],[1,5,"ח","Chariot"],
[2,5,"ט","Strength"],[3,4,"י","Hermit"],
[5,6,"כ","Wheel"],[5,7,"ל","Justice"],
[6,7,"מ","Hanged Man"],[6,8,"נ","Death"],
[7,8,"ס","Temperance"],[8,9,"ע","Devil"],
[3,6,"פ","Tower"],[4,7,"צ","Star"],
[5,8,"ק","Moon"],[2,6,"ר","Sun"],
[1,7,"ש","Judgement"],[0,5,"ת","World"]
];

const svg=document.getElementById("tree");
let lines=[];

// draw paths
paths.forEach((p,i)=>{
let l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",pos[p[0]][0]);
l.setAttribute("y1",pos[p[0]][1]);
l.setAttribute("x2",pos[p[1]][0]);
l.setAttribute("y2",pos[p[1]][1]);
l.setAttribute("class","line");

l.onclick=()=>{
clearGlow();
l.classList.add("glow");
tone(200+i*20);

info.innerHTML=`<b>Path ${p[2]}</b><br>
Tarot: ${p[3]}`;
};

svg.appendChild(l);
lines.push(l);

// Hebrew letter
let t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",(pos[p[0]][0]+pos[p[1]][0])/2);
t.setAttribute("y",(pos[p[0]][1]+pos[p[1]][1])/2);
t.textContent=p[2];
svg.appendChild(t);
});

// nodes
pos.forEach((p,i)=>{
let c=document.createElementNS("http://www.w3.org/2000/svg","circle");
c.setAttribute("cx",p[0]);
c.setAttribute("cy",p[1]);
c.setAttribute("r",28);
c.setAttribute("class","node");

c.onclick=()=>{
let d=seph[i];
info.innerHTML=
`<b>${d[0]}</b><br>
Divine: ${d[1]}<br>
Archangel: ${d[2]}<br>
Colour: ${d[3]}<br>
Body: ${d[4]}<br><br>${d[5]}`;
tone(150+i*20);
};

svg.appendChild(c);
});

function clearGlow(){lines.forEach(l=>l.classList.remove("glow"));}

// ---------- TAROT ----------
const tarot=[
"Fool","Magician","High Priestess","Empress","Emperor","Hierophant",
"Lovers","Chariot","Strength","Hermit","Wheel","Justice",
"Hanged Man","Death","Temperance","Devil","Tower","Star",
"Moon","Sun","Judgement","World"
];

tarot.forEach((t,i)=>{
let c=document.createElement("div");
c.className="card";

c.innerHTML=`<img src="https://via.placeholder.com/200x300?text=${t}">
<h4>${t}</h4>`;

c.onclick=()=>{
clearGlow();
lines[i].classList.add("glow");
show("treePage");
tone(300+i*20);
};

tarotDiv.appendChild(c);
});

// ---------- QUIZ ----------
let score=0;

function startQuiz(){
show("quizPage");
score=0;
nextQ();
}

function nextQ(){
let q=tarot[Math.floor(Math.random()*tarot.length)];
qDiv.innerHTML=`Which card is: <b>${q}</b>?`;

let opts=[q,...tarot.sort(()=>Math.random()-0.5).slice(0,3)];

answers.innerHTML="";
opts.forEach(o=>{
let b=document.createElement("button");
b.innerText=o;
b.onclick=()=>{
if(o===q) score++;
scoreDiv.innerText="Score: "+score;
nextQ();
};
answers.appendChild(b);
});
}

// ---------- NAV ----------
function show(p){
treePage.style.display="none";
tarotPage.style.display="none";
quizPage.style.display="none";
document.getElementById(p).style.display="block";
}

// refs
const info=document.getElementById("info");
const tarotDiv=document.getElementById("tarot");
const qDiv=document.getElementById("q");
const answers=document.getElementById("answers");
const scoreDiv=document.getElementById("score");

</script>

</body>
</html>
