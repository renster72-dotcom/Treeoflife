<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Circled Cross Lodge</title>

<style>
body {
background:#000;
color:#eee;
font-family:Arial;
text-align:center;
}

h1 {color:gold;}

button {
padding:10px;margin:5px;
background:#111;color:#fff;
border:1px solid gold;
cursor:pointer;
}

#tree {
position:relative;
width:600px;
height:820px;
margin:auto;
}

.node {
position:absolute;
width:70px;height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:2px solid gold;
background:gold;
color:#000;
font-size:11px;
cursor:pointer;
}

.line {
position:absolute;
width:2px;
background:#aaa;
transform-origin:top;
}

#info {
margin-top:15px;
padding:10px;
background:#111;
min-height:120px;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:20px;
}

.card {background:#111;padding:10px;}
.card img {width:100%;}
.rune {font-size:40px;color:gold;}

#tarotPage,#runesPage,#quizPage {display:none;}
</style>
</head>

<body>

<h1>Circled Cross Lodge</h1>

<button onclick="show('treePage')">Tree</button>
<button onclick="show('tarotPage')">Tarot</button>
<button onclick="show('runesPage')">Runes</button>
<button onclick="startQuiz()">Quiz</button>

<div id="treePage">
<div id="tree"></div>
<div id="info">Click a Sephirah</div>
</div>

<div id="tarotPage"><div id="tarot" class="grid"></div></div>
<div id="runesPage"><div id="runes" class="grid"></div></div>

<div id="quizPage">
<h2>Quiz</h2>
<div id="q"></div>
<div id="answers"></div>
<div id="score"></div>
</div>

<script>

// ---------------- TREE ----------------
const pos = [
[300,40],
[150,160],[450,160],
[150,320],[450,320],[300,320],
[180,520],[420,520],
[300,660],[300,780]
];

const names=[
"Kether","Chokmah","Binah",
"Chesed","Geburah","Tiphereth",
"Netzach","Hod","Yesod","Malkuth"
];

const tree=document.getElementById("tree");

// correct connections
const paths=[
[0,1],[0,2],[1,2],
[1,3],[2,4],
[3,5],[4,5],
[1,5],[2,5],
[3,4],
[5,6],[5,7],
[6,7],
[6,8],[7,8],
[8,9],
[3,6],[4,7],
[5,8],
[2,6],[1,7],
[0,5]
];

// draw lines
paths.forEach(p=>{
let x1=pos[p[0]][0]+35;
let y1=pos[p[0]][1]+35;
let x2=pos[p[1]][0]+35;
let y2=pos[p[1]][1]+35;

let dx=x2-x1;
let dy=y2-y1;
let len=Math.sqrt(dx*dx+dy*dy);
let ang=Math.atan2(dy,dx)*180/Math.PI;

let l=document.createElement("div");
l.className="line";
l.style.height=len+"px";
l.style.left=x1+"px;
l.style.top=y1+"px";
l.style.transform="rotate("+ang+"deg)";
tree.appendChild(l);
});

// nodes
names.forEach((n,i)=>{
let d=document.createElement("div");
d.className="node";
d.style.left=pos[i][0]+"px";
d.style.top=pos[i][1]+"px";
d.innerText=n;

d.onclick=()=>{
document.getElementById("info").innerHTML =
"<b>"+n+"</b>";
};

tree.appendChild(d);
});

// ---------------- TAROT ----------------
const tarot=[
["Fool","https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/RWS_Tarot_00_Fool.jpg/200px-RWS_Tarot_00_Fool.jpg","New beginnings, leap of faith, divine innocence"],
["Magician","https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/RWS_Tarot_01_Magician.jpg/200px-RWS_Tarot_01_Magician.jpg","Manifestation, willpower, directing energy"],
["High Priestess","https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/RWS_Tarot_02_High_Priestess.jpg/200px-RWS_Tarot_02_High_Priestess.jpg","Intuition, hidden knowledge, subconscious"],
["Empress","https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/RWS_Tarot_03_Empress.jpg/200px-RWS_Tarot_03_Empress.jpg","Creation, fertility, nurturing"],
["Emperor","https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/RWS_Tarot_04_Emperor.jpg/200px-RWS_Tarot_04_Emperor.jpg","Authority, structure, leadership"],
["Hierophant","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/RWS_Tarot_05_Hierophant.jpg/200px-RWS_Tarot_05_Hierophant.jpg","Tradition, spiritual teaching"],
["Lovers","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/TheLovers.jpg/200px-TheLovers.jpg","Union, choice, alignment"],
["Chariot","https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/RWS_Tarot_07_Chariot.jpg/200px-RWS_Tarot_07_Chariot.jpg","Victory, control, determination"],
["Strength","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/RWS_Tarot_08_Strength.jpg/200px-RWS_Tarot_08_Strength.jpg","Inner strength, courage"],
["Hermit","https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/RWS_Tarot_09_Hermit.jpg/200px-RWS_Tarot_09_Hermit.jpg","Wisdom, introspection"],
["Wheel","https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg/200px-RWS_Tarot_10_Wheel_of_Fortune.jpg","Cycles, fate, change"],
["Justice","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/RWS_Tarot_11_Justice.jpg/200px-RWS_Tarot_11_Justice.jpg","Balance, truth"],
["Hanged Man","https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/RWS_Tarot_12_Hanged_Man.jpg/200px-RWS_Tarot_12_Hanged_Man.jpg","Surrender, new perspective"],
["Death","https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/RWS_Tarot_13_Death.jpg/200px-RWS_Tarot_13_Death.jpg","Transformation, endings"],
["Temperance","https://upload.wikimedia.org/wikipedia/commons/thumb/f/f8/RWS_Tarot_14_Temperance.jpg/200px-RWS_Tarot_14_Temperance.jpg","Harmony, balance"],
["Devil","https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/RWS_Tarot_15_Devil.jpg/200px-RWS_Tarot_15_Devil.jpg","Attachment, illusion"],
["Tower","https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/RWS_Tarot_16_Tower.jpg/200px-RWS_Tarot_16_Tower.jpg","Sudden change, upheaval"],
["Star","https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/RWS_Tarot_17_Star.jpg/200px-RWS_Tarot_17_Star.jpg","Hope, guidance"],
["Moon","https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/RWS_Tarot_18_Moon.jpg/200px-RWS_Tarot_18_Moon.jpg","Illusion, subconscious"],
["Sun","https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/RWS_Tarot_19_Sun.jpg/200px-RWS_Tarot_19_Sun.jpg","Success, vitality"],
["Judgement","https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/RWS_Tarot_20_Judgement.jpg/200px-RWS_Tarot_20_Judgement.jpg","Awakening, rebirth"],
["World","https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/RWS_Tarot_21_World.jpg/200px-RWS_Tarot_21_World.jpg","Completion, wholeness"]
];

tarot.forEach(t=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${t[1]}" onerror="this.style.display='none'">
<h4>${t[0]}</h4>
<p>${t[2]}</p>`;
document.getElementById("tarot").appendChild(c);
});

// ---------------- RUNES ----------------
const runes=[
["ᚠ","Fehu","Wealth, flow, moving energy"],
["ᚢ","Uruz","Strength, primal force"],
["ᚦ","Thurisaz","Protection, conflict"],
["ᚨ","Ansuz","Wisdom, communication"],
["ᚱ","Raidho","Journey, movement"],
["ᚲ","Kenaz","Knowledge, illumination"],
["ᚷ","Gebo","Gift, exchange"],
["ᚹ","Wunjo","Joy, harmony"],
["ᚺ","Hagalaz","Disruption, change"],
["ᚾ","Nauthiz","Need, resistance"],
["ᛁ","Isa","Stillness, pause"],
["ᛃ","Jera","Cycles, harvest"],
["ᛇ","Eihwaz","Endurance, transformation"],
["ᛈ","Perthro","Mystery, fate"],
["ᛉ","Algiz","Protection, higher self"],
["ᛋ","Sowilo","Success, vitality"],
["ᛏ","Tiwaz","Victory, honour"],
["ᛒ","Berkano","Growth, birth"],
["ᛖ","Ehwaz","Movement, trust"],
["ᛗ","Mannaz","Self, humanity"],
["ᛚ","Laguz","Flow, intuition"],
["ᛜ","Ingwaz","Potential, gestation"],
["ᛞ","Dagaz","Breakthrough, awakening"],
["ᛟ","Othala","Heritage, legacy"]
];

runes.forEach(r=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`<div class="rune">${r[0]}</div>
<h4>${r[1]}</h4>
<p>${r[2]}</p>`;
document.getElementById("runes").appendChild(c);
});

// ---------------- QUIZ ----------------
let score=0;

function startQuiz(){
show("quizPage");
score=0;
nextQ();
}

function nextQ(){
let q=tarot[Math.floor(Math.random()*tarot.length)];

document.getElementById("q").innerHTML =
"<b>Which card matches this meaning?</b><br>"+q[2];

let options=[q,...tarot.sort(()=>Math.random()-0.5).slice(0,3)];

let html="";
options.forEach(o=>{
html+=`<button onclick="answer('${o[0]}','${q[0]}')">${o[0]}</button>`;
});

document.getElementById("answers").innerHTML=html;
}

function answer(a,b){
if(a===b) score++;
document.getElementById("score").innerText="Score: "+score;
nextQ();
}

function show(p){
["treePage","tarotPage","runesPage","quizPage"].forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(p).style.display="block";
}

</script>

</body>
</html>
